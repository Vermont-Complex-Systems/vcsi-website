name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Every Sunday at 6am UTC (1am EST)
    - cron: '0 6 * * 0'
  workflow_dispatch: # Manual trigger

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh OpenAlex data
        env:
          OPENALEXAPI: ${{ secrets.OPENALEXAPI }}
        run: npm run openalex:populate

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openalex.db
          git diff --cached --quiet || git commit -m "chore: refresh OpenAlex data"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to silk server
        run: |
          rsync -avz --delete build/ cmplxsys@vcsi.cmplxsys.w3.uvm.edu:~/vermontcomplexsystems.org-root
